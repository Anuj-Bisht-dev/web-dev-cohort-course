<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a2332;
            --border: #2d3a4f;
            --text: #e8ecf1;
            --muted: #8b9aaf;
            --accent: #5b9cf5;
            --accent-hover: #7eb0f7;
            --radius: 10px;
            --font: system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font);
            background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
            color: var(--text);
            padding: 2rem 1rem;
        }

        .app {
            max-width: 28rem;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 1.25rem;
            color: var(--text);
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        #userInput {
            flex: 1;
            min-width: 0;
            padding: 0.75rem 1rem;
            font: inherit;
            font-size: 0.95rem;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        #userInput::placeholder {
            color: var(--muted);
        }

        #userInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91, 156, 245, 0.25);
        }

        #inputBtn {
            flex-shrink: 0;
            padding: 0.75rem 1.15rem;
            font: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            color: #0f1419;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
        }

        #inputBtn:hover {
            background: var(--accent-hover);
        }

        #inputBtn:active {
            transform: scale(0.98);
        }

        #userOutput {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        #userOutput li {
            padding: 0.7rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) - 2px);
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
        }

        #userOutput li:hover {
            border-color: var(--muted);
            background: #222d3f;
        }

        #userOutput li:active {
            transform: scale(0.995);
        }

        #userOutput:not(:has(li))::after {
            content: "No tasks yet — add one above.";
            display: block;
            padding: 1.25rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>Todo</h1>
        <div class="controls">
            <input type="text" placeholder="Enter Your Task" id="userInput">
            <button type="button" id="inputBtn">Create</button>
        </div>
        <ul id="userOutput">
        </ul>
    </div>
</body>
<script defer>

    const userInputBox = document.getElementById("userInput");
    const inputBtn = document.getElementById("inputBtn");
    const userOutputSection = document.getElementById("userOutput");

    (async () => {
        let response = fetch("https://api.freeapi.app/api/v1/public/quotes", {
            method: "GET",
        });

        response.then((response) => response.json())
            .then((data) => {
                for (let i = 0; i < data.data.data.length; i++) {
                    console.log(data.data.data[i].content);
                    const userOutputSectionList = document.createElement("li");
                    userOutputSectionList.innerText = data.data.data[i].content;
                    userOutputSection.appendChild(userOutputSectionList);
                }
            })
    })()

    inputBtn.addEventListener("click", () => {
        const inputBoxValue = userInputBox.value;
        const userOutputSectionList = document.createElement("li");

        userOutputSectionList.addEventListener("click", () => {
            userOutputSectionList.remove();
        });

        userOutputSectionList.innerText = inputBoxValue;
        userOutputSection.appendChild(userOutputSectionList);
        userInputBox.value = "";

    });

</script>

</html>
